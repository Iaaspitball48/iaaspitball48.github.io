name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          A95574: ${{ secrets.A95574 }}
          B365C7: ${{ secrets.B365C7 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A95574', '')
          bm = os.environ.get('B365C7', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- 4f69d7a4ba4ba5a516296d30d8eec288 -->', gm)
          if bm:
              s2 = s2.replace('<!-- 6031cf94b0f0d94b3adc0228068547db36db9385dc6f3782 -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
