name: Update Sitemap

# Tatakbo ito: (1) araw-araw sa 2:00 AM UTC, (2) kada may bagong push sa main,
# at (3) pwede ring i-trigger manually sa GitHub tab na "Actions".
on:
  schedule:
    - cron: "0 2 * * *"
  push:
    branches: [main]
    paths-ignore:
      - 'sitemap.xml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate sitemap.xml
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
        run: python scripts/generate_sitemap.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --quiet --cached || git commit -m "chore: auto-update sitemap.xml [skip ci]"
          git push
