<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flixer</title>
<!--
  Ang GitHub Pages ay static hosting lang — walang server-side routing.
  Kaya kapag direktang binisita o ni-refresh ang isang URL tulad ng
  /AllFLix1/movie/avatar-2009-19995, magbabalik ito ng 404 mula mismo sa
  GitHub Pages bago pa man makarating ang request sa index.html/script.js.

  Ang pahinang ito ang humaharap sa 404 na 'yon: itinatago muna niya ang
  orihinal na ninais na path sa sessionStorage, pagkatapos ay babalik sa
  homepage. Doon, may maikling script sa <head> ng index.html na babasa
  ulit ng naka-save na path at ibabalik ito sa address bar bago mag-render
  ang app — kaya nakikita pa rin ng user (at ng Google) ang tamang
  /movie/... URL, gumagana lang ito sa likod ng eksena.

  ALALAHANIN: dahil "AllFLix1" ang pangalan ng repo, hindi ito naka-host sa
  root ng domain ("/") kundi sa "/AllFLix1/" (project page, hindi user page).
  Kaya hindi pwedeng location.replace("/") lang — babalik 'yon sa root na
  walang site, at 404 ulit. Sa halip, kino-compute dito ang tamang base
  folder mula mismo sa URL (ang parte bago ang "/movie/" o "/tv/"), kaya
  gumagana ito kahit saan pang subfolder i-publish o i-rename ang repo.
-->
<script>
    var path = location.pathname + location.search + location.hash;
    sessionStorage.setItem("flixer_redirect_path", path);

    var match = location.pathname.match(/^(.*?)\/(movie|tv)\//);
    var base = match ? match[1] + "/" : "/";
    location.replace(base);
</script>
</head>
<body>
    Redirecting…
</body>
</html>
